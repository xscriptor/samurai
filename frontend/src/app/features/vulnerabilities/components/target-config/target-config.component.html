<section class="panel">
  <h2 class="t-heading">TARGET_URL</h2>

  <div class="input-group">
    <label class="t-label" for="vuln-target-url">FULL ENDPOINT URL</label>
    <input
      id="vuln-target-url"
      name="vuln-target-url"
      type="text"
      [ngModel]="targetUrl"
      (ngModelChange)="targetUrlChange.emit($event)"
      [disabled]="isScanning"
    >
  </div>

  <div class="modules-group">
    <label class="t-label">ANALYSIS MODULES</label>
    <div class="module-grid">
      <button
        type="button"
        class="module-chip"
        *ngFor="let module of moduleOptions"
        [class.active]="activeModules[module.key]"
        [disabled]="isScanning"
        (click)="moduleToggle.emit(module.key)"
        [attr.aria-pressed]="activeModules[module.key]"
        [attr.aria-label]="'Toggle module ' + module.label"
      >
        <span class="t-label">{{ module.label }}</span>
        <span class="chip-help">{{ module.description }}</span>
      </button>
    </div>

    <div class="module-actions">
      <button
        type="button"
        class="btn-secondary"
        (click)="activateAllModules.emit()"
        [disabled]="isScanning || allModulesActive"
      >
        ACTIVATE ALL MODULES
      </button>
    </div>
  </div>

  <div class="auth-config" *ngIf="activeModules['auth_scan']" role="group" aria-labelledby="auth-context-title">
    <div class="auth-header">
      <span id="auth-context-title" class="t-label">AUTHENTICATED SCAN CONTEXT</span>
      <span class="chip-help">Optional. If empty, the scan runs unauthenticated boundary checks only.</span>
    </div>

    <div class="auth-grid">
      <div class="input-group compact full-row">
        <label class="t-label" for="auth-priority">AUTH PRIORITY</label>
        <select
          id="auth-priority"
          name="auth-priority"
          [ngModel]="authScanConfig.authMode"
          (ngModelChange)="patchAuthScanConfig({ authMode: $event })"
          [disabled]="isScanning"
        >
          <option value="bearer_first">BEARER FIRST (fallback BASIC)</option>
          <option value="basic_first">BASIC FIRST (fallback BEARER)</option>
        </select>
      </div>

      <div class="input-group compact">
        <label class="t-label" for="auth-bearer-token">BEARER TOKEN</label>
        <input
          id="auth-bearer-token"
          name="auth-bearer-token"
          type="password"
          [ngModel]="authScanConfig.bearerToken"
          (ngModelChange)="patchAuthScanConfig({ bearerToken: $event })"
          [disabled]="isScanning"
          placeholder="eyJhbGciOi..."
        >
        <span class="chip-help">MASKED: {{ maskSensitive(authScanConfig.bearerToken) }}</span>
      </div>

      <div class="input-group compact">
        <label class="t-label" for="auth-basic-user">BASIC USER</label>
        <input
          id="auth-basic-user"
          name="auth-basic-user"
          type="text"
          [ngModel]="authScanConfig.basicUser"
          (ngModelChange)="patchAuthScanConfig({ basicUser: $event })"
          [disabled]="isScanning"
          placeholder="username"
        >
      </div>

      <div class="input-group compact">
        <label class="t-label" for="auth-basic-password">BASIC PASSWORD</label>
        <input
          id="auth-basic-password"
          name="auth-basic-password"
          type="password"
          [ngModel]="authScanConfig.basicPass"
          (ngModelChange)="patchAuthScanConfig({ basicPass: $event })"
          [disabled]="isScanning"
          placeholder="password"
        >
        <span class="chip-help">MASKED: {{ maskSensitive(authScanConfig.basicPass) }}</span>
      </div>

      <div class="input-group compact full-row">
        <label class="t-label" for="auth-cookie-header">COOKIE HEADER</label>
        <input
          id="auth-cookie-header"
          name="auth-cookie-header"
          type="text"
          [ngModel]="authScanConfig.cookieHeader"
          (ngModelChange)="patchAuthScanConfig({ cookieHeader: $event })"
          [disabled]="isScanning"
          placeholder="session=...; csrftoken=..."
        >
        <span class="chip-help">MASKED: {{ maskSensitive(authScanConfig.cookieHeader) }}</span>
      </div>
    </div>
  </div>

  <button type="button" class="btn-primary destructive" (click)="initiate.emit()" [disabled]="isScanning" aria-label="Initiate DAST scan">
    {{ isScanning ? 'DAST SCAN IN PROGRESS' : 'INITIATE DAST SCAN' }}
  </button>
</section>
