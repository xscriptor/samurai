<section class="panel terminal-panel" aria-live="polite" aria-atomic="false">
  <h2 class="t-label terminal-head">LIVE_TERMINAL_OUTPUT</h2>

  <div class="nothing-term" #scrollMe [scrollTop]="scrollMe.scrollHeight" role="log" aria-label="Scanner terminal output">
    <pre *ngFor="let line of terminalLogs">{{ line }}</pre>
    <div class="cursor" *ngIf="isScanning" style="display:inline-block; vertical-align: bottom;" aria-hidden="true"></div>
  </div>
</section>
