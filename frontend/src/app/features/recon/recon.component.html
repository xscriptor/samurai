<div class="route-container">
  <header class="section-header">
    <div>
      <h1 class="t-heading">WEB_RECONNAISSANCE</h1>
      <span class="t-label">PASSIVE INTELLIGENCE GATHERING AND ENDPOINT MAPPING</span>
    </div>
  </header>

  <app-recon-controls
    [targetDomain]="targetDomain"
    [isScanning]="isScanning"
    [selectedModules]="selectedModules"
    [reconModules]="reconModules"
    (targetDomainChange)="updateTargetDomain($event)"
    (toggleModule)="toggleModule($event)"
    (preset)="selectPreset($event)"
    (start)="startRecon()"
    (clear)="clearTerminal()"
  ></app-recon-controls>

  <app-recon-terminal [lines]="terminalLines" [isScanning]="isScanning"></app-recon-terminal>

  <section class="recon-actions-zone" *ngIf="reconResults">
    <app-recon-export-actions
      [hasExports]="!!reconResults"
      (exportCsv)="exportReconAsCsv()"
      (exportJson)="exportReconAsJson()"
      (exportPdf)="exportReconAsPdf()"
      (exportBinary)="exportReconAsBinary()"
    ></app-recon-export-actions>

    <div class="recon-filter-zone">
      <span class="t-label">[ RESULT VIEW ]</span>
      <div class="recon-filter-list" role="tablist" aria-label="Results section filter">
        <button
          *ngFor="let option of resultsViewOptions"
          type="button"
          role="tab"
          class="btn-reset recon-filter-btn"
          [class.active]="activeResultsView === option.id"
          [attr.aria-selected]="activeResultsView === option.id"
          [attr.aria-label]="'Show ' + option.label + ' results'"
          (click)="setResultsView(option.id)"
        >
          {{ option.label }}
        </button>
      </div>
    </div>
  </section>

  <app-recon-results
    [results]="reconResults"
    [targetDomain]="targetDomain"
    [activeFilter]="activeResultsView"
  ></app-recon-results>
</div>
